version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: visitor_admin
      POSTGRES_PASSWORD: visitor123
      POSTGRES_DB: visitor_management
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  postgres_data:
